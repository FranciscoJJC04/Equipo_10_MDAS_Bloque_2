<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Reserva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            color: #001a44;
            margin-bottom: 2rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #001a44;
        }
        button {
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #003a88;
        }
        .mensaje {
            text-align: center;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .mensaje.error {
            color: #ff6666;
        }
        .mensaje.success {
            color: #4caf50;
        }
        .btn-volver {
            display: block;
            margin: 20px auto 0;
            width: fit-content;
            padding: 10px 20px;
            background-color: #999;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-volver:hover {
            background-color: #666;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <a href="/">Inicio</a>
        <a href="#socios">Socios</a>
        <a href="#reservas">Reservas</a>
        <a href="#patron">Patron</a>
        <a href="#alquileres">Alquileres</a>
        <a href="#embarcacion">Embarcacion</a>
    </nav>

    <div class="container">
        <h1>Crear Reserva</h1>

        <div th:if="${error}" class="mensaje error" th:text="${error}"></div>
        <div th:if="${success}" class="mensaje success"
             th:text="'La reserva ha sido registrada correctamente. El proceso de validación y confirmación de disponibilidad está en curso.'"></div>

        <form th:action="@{/addReserva}" th:object="${newReserva}" method="post">
            <label for="descripcionReserva">Propósito de la Reserva</label>
            <textarea id="descripcionReserva" th:field="*{descripcionReserva}" rows="3" maxlength="255"
                      placeholder="Describe brevemente el propósito de la reserva..." required></textarea>

            <label for="matricula">Embarcación asignada a un patrón</label>
            <select id="matricula" th:field="*{matricula}" required>
                <option value="" disabled selected>-- Seleccione embarcación --</option>
                <option th:each="a : ${asignaciones}"
                        th:value="${a['matricula']}"
                        th:text="${a['matricula']} + ' - ' + ${a['fecha_asignacion']} + ' - ' + ${a['dni_patron']}"></option>
            </select>

            <label for="dniSocio">DNI Titular</label>
            <select id="dniSocio" th:field="*{dniSocio}" required>
                <option value="" disabled selected>-- Seleccione socio --</option>
                <option th:each="s : ${socios}"
                        th:value="${s.dni}"
                        th:text="${s.dni} + ' - ' + ${s.nombre} + ' ' + ${s.apellidos}"></option>
            </select>

            <label for="numPasajeros">Número de Pasajeros</label>
            <input type="number" id="numPasajeros" th:field="*{numPasajeros}" min="1" required />

            <label for="fecha">Fecha de la Reserva</label>
            <input type="date" id="fecha" th:field="*{fecha}" required />

            <button type="submit">Crear reserva</button>
        </form>

        <a th:href="@{/}" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
