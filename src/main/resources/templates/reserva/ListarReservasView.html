<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Reservas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 95%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            color: #001a44;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #001a44;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .btn-volver {
            display: block;
            margin: 20px auto 0;
            width: fit-content;
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-volver:hover {
            background-color: #003a88;
        }
        .mensaje {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #555;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <a href="/">Inicio</a>
        <a href="#socios">Socios</a>
        <a href="#reservas">Reservas</a>
        <a href="#patron">Patron</a>
        <a href="#alquileres">Alquileres</a>
        <a href="#embarcacion">Embarcacion</a>
    </nav>

    <div class="container">
        <h1>Listado de Reservas</h1>

        <div class="mensaje" th:if="${reservas == null or #lists.isEmpty(reservas)}">
            No hay reservas para mostrar.
        </div>

        <div th:if="${reservas != null and !#lists.isEmpty(reservas)}">
            <table>
                <thead>
                    <tr>
                        <th>Id de la Reserva</th>
                        <th>Fecha de la Reserva</th>
                        <th>DNI del Socio</th>
                        <th>Matrícula de la Embarcación Reservada</th>
                        <th>Descripción de la Reserva</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${reserva.id}">Id</td>
                        <td th:text="${#temporals.format(reserva.fecha,'dd/MM/yyyy')}">Fecha</td>
                        <td th:text="${reserva.dniSocio}">DNI</td>
                        <td th:text="${reserva.matricula}">Matrícula</td>
                        <td th:text="${reserva.descripcionReserva}">Descripción</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a th:href="@{/}" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
