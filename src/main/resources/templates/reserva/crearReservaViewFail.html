<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error al crear la reserva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            color: #001a44;
            margin-bottom: 20px;
        }
        .mensaje {
            font-weight: bold;
            color: #ff6666;
            margin-bottom: 20px;
        }
        .btn-volver {
            display: block;
            margin: 0 auto;
            width: fit-content;
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-volver:hover {
            background-color: #003a88;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <a href="/">Inicio</a>
        <a href="#socios">Socios</a>
        <a href="#reservas">Reservas</a>
        <a href="#patron">Patron</a>
        <a href="#alquileres">Alquileres</a>
        <a href="#embarcacion">Embarcacion</a>
    </nav>

    <div class="container">
        <h1>Error al crear la reserva ❌</h1>
        <div class="mensaje" th:if="${error}" th:text="${error}"></div>
        <div class="mensaje" th:unless="${error}">Se ha producido un error al crear la reserva.</div>
        <a th:href="@{/addReserva}" class="btn-volver">Volver al formulario</a>
        <a th:href="@{ / }" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
