<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Patrón a Embarcación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 2rem;
            z-index: 1000;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover { text-decoration: underline; }
        .container {
            margin: 120px auto;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        h1 { text-align: center; color: #001a44; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button, a.btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #001a44;
            color: white;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        button:hover, a.btn:hover { background-color: #003a88; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Inicio</a>
        <a href="#socios">Socios</a>
        <a href="#embarcaciones">Embarcaciones</a>
        <a href="#patrones">Patrones</a>
    </nav>

    <div class="container">
        <h1>Asignar Patrón a Embarcación</h1>
        <form method="post" th:action="@{/AsignarPatronEmbarcacion}">
            <label>Seleccionar Embarcación:</label>
            <select name="embarcacion.matricula" id="matricula" required>
                <option value="" disabled selected>-- Seleccione embarcación --</option>
                <option th:each="emb : ${embarcaciones}"
                        th:value="${emb.matricula}"
                        th:text="${emb.matricula + ' - ' + emb.tipo}"></option>
            </select>

            <label>Seleccionar Patrón:</label>
            <select name="patron.dni_patron" id="dniPatron" required>
                <option value="" disabled selected>-- Seleccione patrón --</option>
                <option th:each="p : ${patrones}"
                        th:value="${p.dni_patron}"
                        th:text="${p.dni_patron + ' - ' + p.apellido + ', ' + p.nombre}"></option>
            </select>

            <label>Fecha de Inicio:</label>
            <input type="date" name="fechaAsignacion" required>

            <label>Fecha de Fin:</label>
            <input type="date" name="fechaFin">

            <button type="submit">Asignar Patrón</button>
        </form>
        <a href="/" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
