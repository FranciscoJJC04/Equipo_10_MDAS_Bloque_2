<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Embarcación Añadida</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        .container {
            margin: 120px auto;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            text-align: center;
        }
        a.btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #001a44;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
        a.btn:hover { background-color: #003a88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Embarcación añadida con éxito</h1>
        <div th:if="${embarcacion != null}">
            <p>Matrícula: <span th:text="${embarcacion.matricula}"></span></p>
            <p>Nombre: <span th:text="${embarcacion.nombre}"></span></p>
        </div>

        <a href="/addEmbarcacion" class="btn">Volver al formulario</a>
        <a href="/" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
