<!DOCTYPE html>
<html lang="es" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inscripción Familiar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
        }
        input[type="text"],
        input[type="date"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            width: 100%;
        }
        input[type="checkbox"] {
            transform: scale(1.2);
            margin-right: 10px;
        }
        .btn-submit {
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #003a88;
        }
        .btn-volver {
            display: block;
            margin: 20px auto 0;
            width: fit-content;
            padding: 10px 20px;
            background-color: #999;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-volver:hover {
            background-color: #666;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
<nav>
    <a href="/">Inicio</a>
    <a href="/#socios">Socios</a>
    <a href="/#reservas">Reservas</a>
    <a href="/#patron">Patrón</a>
    <a href="/#alquileres">Alquileres</a>
    <a href="/#embarcacion">Embarcación</a>
</nav>

    <!-- CONTENIDO -->
    <div class="container">
        <h1>Formulario de Inscripción Familiar</h1>
        <form th:action="@{/nuevaInscripcionFamiliar}" th:object="${socio}" method="post">
            <label for="dni">DNI:</label>
            <input type="text" id="dni" th:field="*{dni}" required />

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}" required />

            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" th:field="*{apellidos}" required />

            <label for="fechaNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" required />

            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" th:field="*{direccion}" required />

            <label>
                <input type="checkbox" id="tituloPatron" th:field="*{tituloPatron}" />
                ¿Tiene título de patrón?
            </label>

            <label for="fechaInscripcion">Fecha de inscripción:</label>
            <input type="date" id="fechaInscripcion" th:field="*{fechaInscripcion}" required />

            <button type="submit" class="btn-submit">Registrar socio familiar</button>
        </form>

        <a th:href="@{/}" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
