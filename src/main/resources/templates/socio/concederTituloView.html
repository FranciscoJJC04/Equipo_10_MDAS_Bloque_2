<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conceder Título de Patrón</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
            background: #f4f4f4;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        p {
            margin: 0;
        }
        .btn-submit {
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #003a88;
        }
        .btn-volver {
            display: block;
            margin: 20px auto 0;
            width: fit-content;
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-volver:hover {
            background-color: #003a88;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            background-color: #e0f7e0;
            border-radius: 8px;
            color: #006600;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
<nav>
    <a href="/">Inicio</a>
    <a href="/#socios">Socios</a>
    <a href="/#reservas">Reservas</a>
    <a href="/#patron">Patrón</a>
    <a href="/#alquileres">Alquileres</a>
    <a href="/#embarcacion">Embarcación</a>
</nav>

    <!-- CONTENIDO -->
    <div class="container">
        <h1>Conceder Título de Patrón</h1>

        <form id="tituloForm" th:action="@{/concederTitulo}" method="post">
            <label for="dni">Socio (DNI - Apellidos, Nombre)</label>
            <select id="dni" name="dni" required>
                <option value="">-- Seleccione un socio --</option>
                <option th:each="s : ${socios}"
                        th:value="${s.dni}"
                        th:text="${s.dni} + ' - ' + ${s.apellidos} + ', ' + ${s.nombre}">
                </option>
            </select>

            <p>Al enviar se concederá el título de patrón al socio seleccionado.</p>
            <button type="submit" class="btn-submit">Conceder título</button>
        </form>

        <div th:if="${message}" class="message">
            <p th:text="${message}"></p>
        </div>

        <a href="/" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
