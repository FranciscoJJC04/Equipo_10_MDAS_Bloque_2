<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Alquiler</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            scroll-behavior: smooth;
        }
        nav {
            background-color: #001a44;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            color: #001a44;
            margin-bottom: 20px;
        }
        form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        form input, form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button, .btn-volver {
            display: block;
            margin: 20px auto 0;
            padding: 10px 20px;
            background-color: #001a44;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover, .btn-volver:hover {
            background-color: #003a88;
        }
        .mensaje-error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
        .mensaje-success {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Inicio</a>
        <a href="#socios">Socios</a>
        <a href="#reservas">Reservas</a>
        <a href="#patron">Patron</a>
        <a href="#alquileres">Alquileres</a>
        <a href="#embarcacion">Embarcacion</a>
    </nav>

    <div class="container">
        <h1>Crear Alquiler</h1>

        <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>
        <div th:if="${success}" class="mensaje-success" th:text="${success}"></div>

        <form th:action="@{/addAlquiler}" th:object="${newAlquiler}" method="post">
            <label for="matricula">Datos de Embarcaciones</label>
            <select id="matricula" th:field="*{matricula}">
                <option value="" disabled selected>-- Seleccione embarcación --</option>
                <option th:each="e : ${embarcaciones}" th:value="${e.matricula}" th:text="${e.tipo + ' - ' + e.numPlazas + ' plazas'}"></option>
            </select>

            <label for="dniSocio">DNI Titular</label>
            <select id="dniSocio" th:field="*{dniSocio}">
                <option value="" disabled selected>-- Seleccione socio --</option>
                <option th:each="s : ${socios}" th:value="${s.dni}" th:text="${s.dni + ' - ' + s.nombre + ' ' + s.apellidos}"></option>
            </select>

            <label for="numPasajeros">Número de Pasajeros</label>
            <input type="number" id="numPasajeros" th:field="*{numPasajeros}" min="1" />

            <label for="fechaInicio">Fecha inicio</label>
            <input type="date" id="fechaInicio" th:field="*{fechaInicio}" />

            <label for="fechaFin">Fecha fin</label>
            <input type="date" id="fechaFin" th:field="*{fechaFin}" />

            <button type="submit">Crear alquiler</button>
        </form>

        <a href="/" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
